<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issued Books | Online Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>📚 Student Dashboard</h1>
    <nav>
      <span id="usernameDisplay" class="username-display"></span>
      <ul>
        <li><a href="dashboard.html">DASHBOARD</a></li>
        <li><a href="books.html">BOOKS</a></li>
        <li><a href="profile.html">PROFILE</a></li>
        <li><a href="feedback.html">FEEDBACK</a></li>
        <li><a href="javascript:void(0)" onclick="logout(); return false;">LOGOUT</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="welcome-section">
      <h2>📚 Issued Books</h2>
      <p>Books you have currently borrowed</p>
    </div>

    <div id="issuedBooksContainer" class="books-section">
      <p style="color: #fff; text-align: center;">Loading issued books...</p>
    </div>
  </div>

  <footer>
    <p>Email: moneeriqbal19@gmail.com</p>
    <p>Mobile: +91 74850 88439</p>
  </footer>

  <script>
    const token = localStorage.getItem('token');
    const adminToken = localStorage.getItem('adminToken');
    const userRole = localStorage.getItem('userRole');
    
    // Redirect admin to admin dashboard (issued books is for students only)
    if (adminToken || userRole === 'admin') {
      window.location.href = 'admin_dashboard.html';
      return;
    }
    
    if (!token) {
      window.location.href = 'student_login.html';
    }

    async function loadIssuedBooks() {
      try {
        const response = await fetch('/api/issues', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'x-auth-token': token
          }
        });
        const data = await response.json();
        
        const container = document.getElementById('issuedBooksContainer');
        
        if (data.success && data.issues && data.issues.length > 0) {
          container.innerHTML = data.issues.map(issue => {
            const book = issue.bookId;
            let imageUrl = book.imageUrl || '/images/books/default-book.jpg';
            if (imageUrl.startsWith('/images/') && !imageUrl.startsWith('/images/books/')) {
              const filename = imageUrl.split('/').pop();
              imageUrl = `/images/books/${filename}`;
            }
            const issueDate = new Date(issue.issueDate).toLocaleDateString();
            return `
            <div class="book-card">
              <img src="${imageUrl}" alt="${book.title}" onerror="console.error('Image failed to load:', this.src); this.style.display='none';">
              <h4>${book.title}</h4>
              ${book.category ? `<p class="book-category">${book.category}</p>` : ''}
              <p style="font-size: 11px; color: #fdf6e3; margin: 5px 0;">Issued: ${issueDate}</p>
              <button class="read-btn" onclick="window.location.href='book_detail.html?id=${book._id}'" style="background: #2ecc71; margin-bottom: 5px;">Read Now</button>
              <button class="read-btn" onclick="returnBook('${issue._id}')">Return Book</button>
            </div>
          `;
          }).join('');
        } else {
          container.innerHTML = '<p style="color: #fff; text-align: center; padding: 40px;">No books currently issued. Visit the books page to borrow books!</p>';
        }
      } catch (error) {
        console.error('Error loading issued books:', error);
        document.getElementById('issuedBooksContainer').innerHTML = 
          '<p style="color: #fff; text-align: center;">Error loading issued books. Please try again.</p>';
      }
    }

    async function returnBook(issueId) {
      if (!confirm('Are you sure you want to return this book?')) {
        return;
      }

      try {
        const response = await fetch(`/api/issues/return/${issueId}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'x-auth-token': token
          }
        });

        const data = await response.json();

        if (data.success) {
          alert('Book returned successfully!');
          loadIssuedBooks();
        } else {
          alert(data.message || 'Failed to return book');
        }
      } catch (error) {
        console.error('Error returning book:', error);
        alert('An error occurred. Please try again.');
      }
    }

           function logout() {
             localStorage.removeItem('token');
             localStorage.removeItem('user');
             localStorage.removeItem('username');
             localStorage.removeItem('userRole');
             window.location.href = 'index.html';
           }

           // Display username in navbar
           const username = localStorage.getItem('username');
           if (username) {
             document.getElementById('usernameDisplay').textContent = username;
           }

    loadIssuedBooks();
  </script>
</body>
</html>
