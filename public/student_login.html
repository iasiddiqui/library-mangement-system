<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | Online Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .password-wrapper { position: relative; }
    .password-wrapper .form-control { padding-right: 48px; }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: #000;
      border-radius: 6px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .password-toggle:hover { color: #000; }
    .password-toggle:focus { outline: none; }
    .password-toggle:active { background: none; }
    .password-toggle svg { width: 20px; height: 20px; pointer-events: none; }
  </style>
</head>
<body>
  <header>
    <h1>ONLINE LIBRARY MANAGEMENT SYSTEM</h1>
    <nav>
      <span id="usernameDisplay" class="username-display" style="display: none;"></span>
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="books.html">BOOKS</a></li>
        <li id="studentLoginLink"><a href="student_login.html">STUDENT LOGIN</a></li>
        <li id="registerLink"><a href="registration.html">REGISTRATION</a></li>
        <li><a href="feedback.html">FEEDBACK</a></li>
        <li id="adminLink"><a href="admin_login.html">ADMIN LOGIN</a></li>
        <li id="logoutLink" style="display: none;"><a href="javascript:void(0)" onclick="logout(); return false;">LOGOUT</a></li>
      </ul>
    </nav>
  </header>

  <section class="login-section">
    <div class="login-box">
      <h2>Student Login</h2>
      <p>Welcome back! Please enter your credentials.</p>
      <div id="message" class="message"></div>
      <form id="loginForm">
        <input type="text" id="username" class="form-control" placeholder="Username" required>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Password" required>
          <button type="button" id="togglePassword" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Show password" title="Show password">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <p style="margin-top:15px;">
        <a href="#">Forgot Password?</a> | 
        <a href="registration.html">Sign Up</a>
      </p>
    </div>
  </section>

  <footer>
    <p>Email: moneeriqbal19@gmail.com</p>
    <p>Mobile: +91 74850 88439</p>
  </footer>

  <script>
    function togglePasswordVisibility() {
      const pwInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeSlashIcon = document.getElementById('eyeSlashIcon');
      const toggleBtn = document.getElementById('togglePassword');
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        eyeIcon.style.display = 'none';
        eyeSlashIcon.style.display = 'block';
        toggleBtn.setAttribute('aria-label', 'Hide password');
        toggleBtn.title = 'Hide password';
      } else {
        pwInput.type = 'password';
        eyeIcon.style.display = 'block';
        eyeSlashIcon.style.display = 'none';
        toggleBtn.setAttribute('aria-label', 'Show password');
        toggleBtn.title = 'Show password';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('username', data.user.username);
          localStorage.setItem('userRole', 'student');
          messageDiv.className = 'message success';
          messageDiv.textContent = 'Login successful! Redirecting...';
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.message || 'Login failed';
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'An error occurred. Please try again.';
      }
    });

    // Hide login/register/admin buttons if logged in
    const token = localStorage.getItem('token');
    const adminToken = localStorage.getItem('adminToken');
    const username = localStorage.getItem('username');

    if (token || adminToken) {
      if (document.getElementById('studentLoginLink')) {
        document.getElementById('studentLoginLink').style.display = 'none';
      }
      if (document.getElementById('registerLink')) {
        document.getElementById('registerLink').style.display = 'none';
      }
      if (document.getElementById('adminLink')) {
        document.getElementById('adminLink').style.display = 'none';
      }
      if (document.getElementById('logoutLink')) {
        document.getElementById('logoutLink').style.display = 'block';
      }
      if (username && document.getElementById('usernameDisplay')) {
        document.getElementById('usernameDisplay').textContent = username;
        document.getElementById('usernameDisplay').style.display = 'flex';
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('adminToken');
      localStorage.removeItem('user');
      localStorage.removeItem('admin');
      localStorage.removeItem('username');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
