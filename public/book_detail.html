<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details | Online Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>📚 Student Dashboard</h1>
    <nav>
      <span id="usernameDisplay" class="username-display"></span>
      <ul>
        <li><a href="dashboard.html">DASHBOARD</a></li>
        <li><a href="books.html">BOOKS</a></li>
        <li><a href="profile.html">PROFILE</a></li>
        <li><a href="issued_books.html">MY BOOKS</a></li>
        <li><a href="feedback.html">FEEDBACK</a></li>
        <li><a href="javascript:void(0)" onclick="logout(); return false;">LOGOUT</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="book-detail-container">
      <div id="message" class="message"></div>
      <div id="bookDetail" class="book-detail-content">
        <p style="color: #fff; text-align: center;">Loading book details...</p>
      </div>
    </div>
  </div>

  <footer>
    <p>Email: moneeriqbal19@gmail.com</p>
    <p>Mobile: +91 74850 88439</p>
  </footer>

  <script>
    const token = localStorage.getItem('token');
    const adminToken = localStorage.getItem('adminToken');
    let userRole = localStorage.getItem('userRole');
    
    // Determine role if not set
    if (!userRole) {
      if (adminToken) {
        userRole = 'admin';
        localStorage.setItem('userRole', 'admin');
      } else if (token) {
        userRole = 'student';
        localStorage.setItem('userRole', 'student');
      }
    }
    
    // Allow both students and admins to view book details, but redirect if not logged in
    if (!token && !adminToken) {
      window.location.href = 'student_login.html';
    }

    // Get book ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('id');

    if (!bookId) {
      window.location.href = 'books.html';
    }

    async function loadBookDetail() {
      try {
        const response = await fetch(`/api/books/${bookId}`);
        const data = await response.json();
        
        const container = document.getElementById('bookDetail');
        
        if (data.success && data.book) {
          const book = data.book;
          let imageUrl = book.imageUrl || '/images/books/default-book.jpg';
          if (imageUrl.startsWith('/images/') && !imageUrl.startsWith('/images/books/')) {
            const filename = imageUrl.split('/').pop();
            imageUrl = `/images/books/${filename}`;
          }

          container.innerHTML = `
            <div class="book-detail-card">
              <div class="book-detail-image">
                <img src="${imageUrl}" alt="${book.title}" onerror="this.style.display='none';">
              </div>
              <div class="book-detail-info">
                <h2>${book.title}</h2>
                ${book.author ? `<p class="book-author"><strong>Author:</strong> ${book.author}</p>` : ''}
                ${book.category ? `<p class="book-category-detail"><strong>Category:</strong> ${book.category}</p>` : ''}
                ${book.description ? `<p class="book-description">${book.description}</p>` : 
                  `<p class="book-description">This is a great book in the ${book.category || 'General'} category. Explore the content and enhance your knowledge.</p>`}
                <div class="book-status">
                  <p><strong>Status:</strong> 
                    <span style="color: ${book.isAvailable ? '#2ecc71' : '#e74c3c'}">
                      ${book.isAvailable ? 'Available' : 'Not Available'}
                    </span>
                  </p>
                </div>
                <div class="book-actions">
                  ${book.isAvailable ? 
                    (token && userRole === 'student' ? `<button class="btn btn-primary" onclick="issueBook('${book._id}')">Issue Book</button>` : 
                    token && userRole === 'admin' ? '' :
                    !token ? `<button class="btn btn-primary" onclick="window.location.href='student_login.html'">Login to Issue</button>` : '') : 
                    `<button class="btn btn-default" disabled>Not Available</button>`
                  }
                  <button class="btn btn-success" onclick="readBook()">Read Now</button>
                  <button class="btn btn-default" onclick="window.location.href='books.html'">Back to Books</button>
                </div>
              </div>
            </div>
          `;
        } else {
          container.innerHTML = '<p style="color: #fff; text-align: center;">Book not found.</p>';
        }
      } catch (error) {
        console.error('Error loading book:', error);
        document.getElementById('bookDetail').innerHTML = 
          '<p style="color: #fff; text-align: center;">Error loading book. Please try again.</p>';
      }
    }

    async function issueBook(bookId) {
      if (!token) {
        alert('Please login to issue books');
        window.location.href = 'student_login.html';
        return;
      }

      if (!confirm('Are you sure you want to issue this book?')) {
        return;
      }

      try {
        const response = await fetch(`/api/issues/${bookId}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'x-auth-token': token
          }
        });

        const data = await response.json();

        if (data.success) {
          showMessage('message', 'Book issued successfully!', 'success');
          setTimeout(() => {
            loadBookDetail();
          }, 1500);
        } else {
          showMessage('message', data.message || 'Failed to issue book', 'error');
        }
      } catch (error) {
        console.error('Error issuing book:', error);
        showMessage('message', 'An error occurred. Please try again.', 'error');
      }
    }

    function readBook() {
      // Navigate to reading page
      window.location.href = `read_book.html?id=${bookId}`;
    }

    function showMessage(elementId, message, type) {
      const messageDiv = document.getElementById(elementId);
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = message;
      setTimeout(() => {
        messageDiv.textContent = '';
        messageDiv.className = '';
      }, 5000);
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      localStorage.removeItem('username');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }

    // Display username in navbar
    const username = localStorage.getItem('username');
    if (username) {
      document.getElementById('usernameDisplay').textContent = username;
    }
    
    // Update navbar based on role
    if (userRole === 'admin') {
      const nav = document.querySelector('nav ul');
      // Update links for admin
      const dashboardLink = nav.querySelector('li a[href="dashboard.html"]');
      if (dashboardLink) {
        dashboardLink.parentElement.innerHTML = '<a href="admin_dashboard.html">ADMIN</a>';
      }
    }

    loadBookDetail();
  </script>
</body>
</html>
