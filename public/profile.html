<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Online Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>📚 Student Dashboard</h1>
    <nav>
      <span id="usernameDisplay" class="username-display"></span>
      <ul>
        <li><a href="dashboard.html">DASHBOARD</a></li>
        <li><a href="books.html">BOOKS</a></li>
        <li><a href="issued_books.html">MY BOOKS</a></li>
        <li><a href="feedback.html">FEEDBACK</a></li>
        <li><a href="javascript:void(0)" onclick="logout(); return false;">LOGOUT</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="welcome-section">
      <h2>👤 My Profile</h2>
    </div>

    <div class="profile-container">
      <div id="message" class="message"></div>
      <form id="profileForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-control" readonly>
        </div>
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" class="form-control" placeholder="First Name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" class="form-control" placeholder="Last Name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-control" placeholder="Email">
        </div>
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" id="rollNo" class="form-control" placeholder="Roll Number">
        </div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
      </form>
    </div>
  </div>

  <footer>
    <p>Email: moneeriqbal19@gmail.com</p>
    <p>Mobile: +91 74850 88439</p>
  </footer>

  <script>
    const token = localStorage.getItem('token');
    const adminToken = localStorage.getItem('adminToken');
    const userRole = localStorage.getItem('userRole');
    
    // Redirect admin to admin dashboard (profile is for students only)
    if (adminToken || userRole === 'admin') {
      window.location.href = 'admin_dashboard.html';
      return;
    }
    
    if (!token) {
      window.location.href = 'student_login.html';
    }

    async function loadProfile() {
      try {
        const response = await fetch('/api/profile', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'x-auth-token': token
          }
        });
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('username').value = data.student.username || '';
          document.getElementById('firstName').value = data.student.firstName || '';
          document.getElementById('lastName').value = data.student.lastName || '';
          document.getElementById('email').value = data.student.email || '';
          document.getElementById('rollNo').value = data.student.rollNo || '';
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        showMessage('message', 'Error loading profile', 'error');
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageDiv = document.getElementById('message');
      
      const profileData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        rollNo: document.getElementById('rollNo').value
      };

      try {
        const response = await fetch('/api/profile', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            'x-auth-token': token
          },
          body: JSON.stringify(profileData)
        });

        const data = await response.json();

        if (data.success) {
          showMessage('message', 'Profile updated successfully!', 'success');
          // Update localStorage user data
          const user = JSON.parse(localStorage.getItem('user') || '{}');
          user.email = data.student.email;
          localStorage.setItem('user', JSON.stringify(user));
        } else {
          showMessage('message', data.message || 'Failed to update profile', 'error');
        }
      } catch (error) {
        showMessage('message', 'An error occurred. Please try again.', 'error');
      }
    });

    function showMessage(elementId, message, type) {
      const messageDiv = document.getElementById(elementId);
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = message;
      setTimeout(() => {
        messageDiv.textContent = '';
        messageDiv.className = '';
      }, 5000);
    }

           function logout() {
             localStorage.removeItem('token');
             localStorage.removeItem('user');
             localStorage.removeItem('username');
             localStorage.removeItem('userRole');
             window.location.href = 'index.html';
           }

           // Display username in navbar
           const username = localStorage.getItem('username');
           if (username) {
             document.getElementById('usernameDisplay').textContent = username;
           }

    loadProfile();
  </script>
</body>
</html>
