<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration | Online Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>ONLINE LIBRARY MANAGEMENT SYSTEM</h1>
    <nav>
      <span id="usernameDisplay" class="username-display" style="display: none;"></span>
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="books.html">BOOKS</a></li>
        <li id="studentLoginLink"><a href="student_login.html">STUDENT LOGIN</a></li>
        <li id="registerLink"><a href="registration.html">REGISTRATION</a></li>
        <li><a href="feedback.html">FEEDBACK</a></li>
        <li id="adminLink"><a href="admin_login.html">ADMIN LOGIN</a></li>
        <li id="logoutLink" style="display: none;"><a href="javascript:void(0)" onclick="logout(); return false;">LOGOUT</a></li>
      </ul>
    </nav>
  </header>

  <div class="register-box">
    <h2>User Registration</h2>
    <div id="message" class="message"></div>
    <form id="registerForm">
      <input type="text" id="firstName" name="firstName" placeholder="First Name">
      <input type="text" id="lastName" name="lastName" placeholder="Last Name">
      <input type="text" id="username" name="username" placeholder="Username" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <input type="text" id="rollNo" name="rollNo" placeholder="Roll No">
      <input type="email" id="email" name="email" placeholder="Email" required>
      <button class="btn" type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="student_login.html">Login</a></p>
  </div>

  <footer>
    <p>Email: moneeriqbal19@gmail.com</p>
    <p>Mobile: +91 74850 88439</p>
  </footer>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageDiv = document.getElementById('message');
      
      const formData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        rollNo: document.getElementById('rollNo').value,
        email: document.getElementById('email').value
      };

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
          messageDiv.className = 'message success';
          messageDiv.textContent = 'Registration successful! Redirecting to login...';
          setTimeout(() => {
            window.location.href = 'student_login.html';
          }, 1500);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.message || data.errors?.[0]?.msg || 'Registration failed';
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'An error occurred. Please try again.';
      }
    });

    // Hide login/register/admin buttons if logged in
    const token = localStorage.getItem('token');
    const adminToken = localStorage.getItem('adminToken');
    const username = localStorage.getItem('username');

    if (token || adminToken) {
      if (document.getElementById('studentLoginLink')) {
        document.getElementById('studentLoginLink').style.display = 'none';
      }
      if (document.getElementById('registerLink')) {
        document.getElementById('registerLink').style.display = 'none';
      }
      if (document.getElementById('adminLink')) {
        document.getElementById('adminLink').style.display = 'none';
      }
      if (document.getElementById('logoutLink')) {
        document.getElementById('logoutLink').style.display = 'block';
      }
      if (username && document.getElementById('usernameDisplay')) {
        document.getElementById('usernameDisplay').textContent = username;
        document.getElementById('usernameDisplay').style.display = 'flex';
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('adminToken');
      localStorage.removeItem('user');
      localStorage.removeItem('admin');
      localStorage.removeItem('username');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
